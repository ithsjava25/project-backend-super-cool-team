spring.application.name=CyberWatch

spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5433/mydatabase}
spring.datasource.username=${DATABASE_USER:myuser}
spring.datasource.password=${DATABASE_PASSWORD:secret}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

app.s3.endpoint=http://localhost:9002
app.s3.region=eu-north-1
app.s3.accessKey=${S3_ACCESS_KEY:minioadmin}
app.s3.secretKey=${S3_SECRET_KEY:minioadmin}
app.s3.bucket=ticket-files


